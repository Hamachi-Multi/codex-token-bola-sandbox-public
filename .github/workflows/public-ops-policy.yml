name: public-ops-policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  id-token: none

jobs:
  public_ops_path_policy:
    name: public-ops-path-policy
    if: startsWith(github.head_ref, 'public-ops/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted policy source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Validate public ops PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/public_ops_path_policy.py \
            --event-file "$GITHUB_EVENT_PATH"
