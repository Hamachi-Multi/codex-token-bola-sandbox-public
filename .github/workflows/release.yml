name: public-ci

on:
  push:
    branches:
      - main
      - release-candidate/*

permissions:
  contents: read
  id-token: none

jobs:
  compile_test:
    name: compile-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile
        run: python3 -m py_compile hooks/token-usage.py scripts/*.py
      - name: Test
        run: python3 -m unittest discover -s tests -v

  asset_static_sanity:
    name: asset-static-sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify dashboard assets
        run: |
          test -f assets/dashboard.html
          test -f assets/dashboard.css
          test -f assets/dashboard.js
          test -d assets/dashboard
          test -d assets/fonts

  public_sensitive_guard:
    name: public-sensitive-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify never-public paths are absent
        run: |
          test ! -e analytics
          test ! -e bad
          test ! -e normalized
          test ! -e raw
          test ! -e reports
          test ! -e state
          test ! -e tmp
          test ! -e release
          test ! -e handoffs
          test ! -e reviews
          test ! -e AGENTS.md

  candidate_snapshot_guard:
    name: candidate-snapshot-guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release-candidate/')
    needs:
      - compile_test
      - asset_static_sanity
      - public_sensitive_guard
    steps:
      - uses: actions/checkout@v4
      - name: Verify candidate snapshot guard boundary
        run: echo "::notice title=placeholder::candidate snapshot guard policy runs here"

  product_snapshot_guard:
    name: product-snapshot-guard
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      checks: read
      id-token: none
    needs:
      - compile_test
      - asset_static_sanity
      - public_sensitive_guard
    outputs:
      release_kind: ${{ steps.guard.outputs.release_kind }}
      semantic_release: ${{ steps.guard.outputs.semantic_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Read public main commit metadata
        id: commit
        shell: bash
        run: |
          git log -1 --pretty=%B > "$RUNNER_TEMP/commit-message.txt"
          author_email="$(git log -1 --pretty=%ae)"
          echo "message_file=$RUNNER_TEMP/commit-message.txt" >> "$GITHUB_OUTPUT"
          echo "author_email=$author_email" >> "$GITHUB_OUTPUT"
      - name: Resolve CodeQL conclusion for product snapshots
        id: codeql
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion="not_required"
          subject="$(git log -1 --pretty=%s)"
          if [[ "$subject" == chore\(public-ops\):* ]]; then
            echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          conclusion=""
          for attempt in {1..60}; do
            conclusion="$(
              gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
                --jq '.check_runs[] | select(.name == "codeql") | .conclusion' \
                | head -n 1
            )"
            if [[ -n "$conclusion" && "$conclusion" != "null" ]]; then
              break
            fi
            sleep 30
          done
          echo "conclusion=${conclusion:-missing}" >> "$GITHUB_OUTPUT"
      - name: Guard public main release path
        id: guard
        run: |
          python3 scripts/public_main_release_guard.py \
            --ref "${{ github.ref }}" \
            --message-file "${{ steps.commit.outputs.message_file }}" \
            --actor "${{ github.actor }}" \
            --expected-promotion-actor "${{ vars.PROMOTION_APP_ACTOR }}" \
            --author-email "${{ steps.commit.outputs.author_email }}" \
            --expected-snapshot-author-email "${{ vars.SNAPSHOT_AUTHOR_EMAIL }}" \
            --codeql-conclusion "${{ steps.codeql.outputs.conclusion }}" \
            --public-ops-actor "${{ vars.PUBLIC_OPS_ACTOR }}" \
            --github-output "$GITHUB_OUTPUT"

  semantic_release:
    name: semantic-release
    runs-on: ubuntu-latest
    needs:
      - compile_test
      - asset_static_sanity
      - public_sensitive_guard
      - product_snapshot_guard
    if: github.ref == 'refs/heads/main' && needs.product_snapshot_guard.outputs.semantic_release == 'true'
    permissions:
      contents: read
      id-token: none
    environment: public-release-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install release dependencies
        run: npm ci
      - name: Mint release-tag GitHub App token
        id: release-tag-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_TAG_APP_ID }}
          private-key: ${{ secrets.RELEASE_TAG_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ steps.release-tag-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          npx semantic-release
