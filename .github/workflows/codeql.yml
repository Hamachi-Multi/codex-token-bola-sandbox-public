name: codeql

on:
  push:
    branches:
      - main
      - release-candidate/*
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: codeql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
